name: DB - deploy

# Schema-Objekte einer Umgebung idempotent ausrollen (ruft db/scripts/deploy.sh).
# Manuell auslösbar. Branch->Umgebung nativ über die Environment-Deployment-Branches
# (dev/int <- dev, test/prod <- main; siehe di2f-0002).

on:
  workflow_dispatch:
    inputs:
      schema:
        description: 'Schema'
        required: true
        default: 'all'
        type: choice
        options: [config, etl, helper, log, all]
      environment:
        description: 'Zielumgebung'
        required: true
        default: 'dev'
        type: choice
        options: [dev, int, test, prod]

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.schema }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: deploy.sh via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_FW_PASSWORD: ${{ secrets.DB_FW_PASSWORD }}
        with:
          host: ${{ secrets.HETZNER_SSH_HOST }}
          username: ${{ secrets.HETZNER_SSH_USER }}
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 2121 }}
          envs: DB_FW_PASSWORD
          script: |
            set -e
            if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
              echo "ERROR: Environment-Variable DEPLOY_PATH ist für '${{ github.event.inputs.environment }}' nicht gesetzt."
              exit 1
            fi
            cd "${{ vars.DEPLOY_PATH }}"
            git fetch origin "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            bash db/scripts/deploy.sh "${{ github.event.inputs.schema }}" "${{ github.event.inputs.environment }}"
